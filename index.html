<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gratta e Vinci dell'Amore ❤️</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Sfondo personalizzabile e sfocato */
        .background-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* SOSTITUISCI 'sfondo.jpg' CON IL NOME DELLA TUA FOTO REALMENTE CARICATA */
            background-image: url('sfondo.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(8px); /* Livello di sfocatura */
            z-index: -1;
            transform: scale(1.05); /* Evita i bordi bianchi causati dalla sfocatura */
        }

        .container { 
            max-width: 420px; 
            width: 100%;
            background: rgba(255, 255, 255, 0.9); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            text-align: center;
            box-sizing: border-box;
        }

        /* Colore Navy per i testi principali */
        h1 { 
            color: #000080; 
            font-size: 24px; 
            margin-bottom: 5px;
        }

        .subtitle {
            color: #000080;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .counter {
            font-size: 14px;
            color: #4a4a4a;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .scratch-card { 
            position: relative; 
            width: 320px; 
            height: 160px; 
            margin: 0 auto 20px auto; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            background: #fff;
        }

        /* Contenuto sotto la patina dorata */
        .secret-content { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold; 
            font-size: 18px; 
            color: #000080; /* Testo Navy */
            text-align: center; 
            padding: 15px; 
            box-sizing: border-box; 
            background: #fdfaf4;
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            cursor: pointer; 
            touch-action: none;
        }

        button {
            background-color: #000080;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #000066;
        }
    </style>
</head>
<body>

    <div class="background-blur"></div>

    <div class="container">
        <h1>Gratta e vedrai cosa ti aspetterà more</h1>
        <p class="subtitle">Potresti vincere un milione di euro, Gratta!</p>
        
        <div class="counter" id="ticketCounter">Biglietto: 1 di 14</div>

        <div class="scratch-card">
            <div class="secret-content" id="secretText">
                <!-- Il testo cambia dinamicamente via JS -->
            </div>
            <canvas id="scratchCanvas" width="320" height="160"></canvas>
        </div>

        <button id="nextBtn" onclick="nextTicket()">Prendi un altro biglietto 🎫</button>
    </div>

    <script>
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const secretText = document.getElementById('secretText');
        const nextBtn = document.getElementById('nextBtn');
        const ticketCounter = document.getElementById('ticketCounter');

        let currentTicket = 1;
        const totalTickets = 14;
        const luckyTicket = 12; // Il 12° biglietto è quello vincente

        let isDrawing = false;
        let scratchCleared = false;

        function initScratchCard() {
            scratchCleared = false;
            nextBtn.style.display = 'none';
            ticketCounter.innerText = `Biglietto: ${currentTicket} di ${totalTickets}`;

            // Imposta il testo segreto in base al numero del biglietto attuale
            if (currentTicket === luckyTicket) {
                secretText.innerHTML = "🎉 HAI VINTO!<br>Un milione di Bacini, Coccole e Morsettini ❤️";
            } else {
                secretText.innerText = "Peccato hai perso, ritenta! 😢";
            }

            // Reset del Canvas (cancella il vecchio stato)
            ctx.globalCompositeOperation = 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Creazione effetto patina ORO lucida con sfumatura radiale
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 20,
                canvas.width / 2, canvas.height / 2, canvas.width / 1.5
            );
            gradient.addColorStop(0, '#ffe066'); // Oro chiaro al centro
            gradient.addColorStop(0.5, '#d4af37'); // Oro metallico classico
            gradient.addColorStop(1, '#aa8010'); // Oro scuro ai bordi
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Aggiunge una texture glitterata sopra l'oro
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            for (let i = 0; i < 600; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                ctx.fillRect(x, y, 2, 2);
            }

            // Testo sulla superficie dorata
            ctx.fillStyle = '#61460b'; // Colore marrone scuro/oro per contrasto sulla patina
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('✨ GRATTA QUI CON IL DITO ✨', canvas.width / 2, canvas.height / 2 + 5);
        }

        function scratch(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            // Gestione sia del mouse che del touch su smartphone
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!clientX || !clientY) return;

            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 24, 0, Math.PI * 2); // Dimensione del cerchio che gratta
            ctx.fill();

            // Mostra il pulsante per avanzare una volta che ha grattato
            if (!scratchCleared) {
                scratchCleared = true;
                // Mostra il pulsante per il prossimo biglietto solo se non siamo all'ultimo (14°)
                if (currentTicket < totalTickets && currentTicket !== luckyTicket) {
                    setTimeout(() => { nextBtn.style.display = 'block'; }, 800);
                }
            }
        }

        function nextTicket() {
            if (currentTicket < totalTickets) {
                currentTicket++;
                initScratchCard();
            }
        }

        // Eventi per Mouse
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);

        // Eventi per Smartphone/Touch
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });

        // Avvio iniziale del primo biglietto
        window.onload = initScratchCard;
    </script>
</body>
</html>
